github_checks:
  annotations: false
comment: false

ignore:
  - "crates/harness/**"
  - "crates/server-fixture/**"
  - "crates/tls/server-fixture/**"
  - "crates/data-fixtures/**"
  - "crates/examples/**"

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%
