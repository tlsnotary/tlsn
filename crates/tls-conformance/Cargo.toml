[package]
name = "tlsn-tls-conformance"
description = "TLS client conformance testing for TLSNotary against the BoGo test suite"
version = "0.0.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[lints]
workspace = true

# Two binaries (auto-discovered from src/bin/):
#   bogo_shim — driven by the BoGo runner, once per test case.
#   bogo      — orchestrator: `bogo fetch` builds the runner, `bogo run` runs the suite.

[dependencies]
tlsn = { workspace = true }

anyhow = { workspace = true }
futures = { workspace = true }
rustls-pemfile = { workspace = true }
tokio = { workspace = true, features = [
    "rt-multi-thread",
    "net",
    "io-util",
    "macros",
    "time",
    "sync",
] }
tokio-util = { workspace = true, features = ["compat"] }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
